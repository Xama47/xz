<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deadline Cubes</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="header">
        <div class="header-bg">
            <div class="prof_block">
               <div class="header_prof">
                  <img id="user-avatar" src="" alt="Avatar">
                  <span id="user-name">Загрузка...</span>
               </div>
            </div>
            <div class="balance_block">
                <div class="balance_badge">
                  <span id="user-balance">0.0$</span>
                  <img src="img/tether.jpg" alt="tether">
                </div>
            </div>
        </div>
    </div>
    <div class="main">
        <div id="name_block">
            <span class="name_for_block">
                <h1>Deadline Cubes</h1>
            </span>
            <div class="info_pepe">
                <span class="info_name">
                  Свежайшая <br> Крипто-Лудка в ТГ
                 </span>
                <img src="img/pepe1.svg" alt="pepe">
            </div>
        </div>
    </div>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="app.js"></script>
</body>
</html>
